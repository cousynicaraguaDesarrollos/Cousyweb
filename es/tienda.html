<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Productos promocionales ecológicos para empresas | Cousy Nicaragua</title>
    <meta
      name="description"
      content="Productos promocionales ecológicos y personalizados para empresas. Armá tu cotización y enviala por WhatsApp."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#d63163" />
    <link rel="canonical" href="https://cousynicaragua.com/es/tienda.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cousy Nicaragua" />
    <meta property="og:title" content="Productos promocionales ecológicos para empresas | Cousy Nicaragua" />
    <meta
      property="og:description"
      content="Productos promocionales ecológicos y personalizados para empresas. Armá tu cotización y enviala por WhatsApp."
    />
    <meta property="og:url" content="https://cousynicaragua.com/es/tienda.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="../assets/logo-cousy.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400&family=Montserrat:wght@300&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/app.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/@hotwired/turbo/dist/turbo.es2017-umd.js"
      defer
    ></script>
  </head>
  <body>
    <header
      id="site-header-es"
      data-site-header
      data-turbo-permanent
      class="sticky top-0 z-50 border-b border-black/10 bg-white"
    ></header>

    <main class="container py-10">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-4xl tracking-tight">Productos promocionales ecológicos para empresas</h1>
          <p class="mt-2 text-black/70">
            Seleccioná productos promocionales ecológicos para tu empresa (merchandising corporativo, regalos empresariales y pedidos al por mayor) y agregalos a tu cotización B2B.
            <span class="ml-2">Resultados: <span data-products-count class="font-semibold">0</span></span>
          </p>
        </div>
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
          <label class="w-full sm:w-72">
            <span class="sr-only">Buscar</span>
            <input
              id="products-search"
              type="search"
              placeholder="Buscar productos…"
              class="w-full rounded-2xl border border-black/10 bg-white px-4 py-3 text-sm outline-none focus:border-brand-accent"
            />
          </label>
          <label class="w-full sm:w-64">
            <span class="sr-only">Categoría</span>
            <select
              id="products-category"
              class="w-full rounded-2xl border border-black/10 bg-white px-4 py-3 text-sm outline-none focus:border-brand-accent"
            ></select>
          </label>
        </div>
      </div>

      <p id="products-error" class="mt-6 text-sm font-semibold text-brand-accent"></p>

      <section class="mt-8 grid gap-5 sm:grid-cols-2 lg:grid-cols-3" id="products-grid"></section>
    </main>

    <footer
      id="site-footer-es"
      data-site-footer
      data-turbo-permanent
      class="border-t border-black/5"
    ></footer>

    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/site.js"></script>
    <script type="module" src="../js/tienda.js"></script>
  </body>
</html>
