<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Regalos corporativos y productos ecológicos hechos a mano | Cousy Nicaragua</title>
    <meta
      name="description"
      content="Regalos corporativos y productos ecológicos hechos a mano en Nicaragua. Armá tu cotización B2B y envíanos tu lista por WhatsApp."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#d63163" />
    <link rel="icon" href="./assets/logo-cousy.png" type="image/png" />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #fff;
        color: #111;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 18px;
      }
      .card {
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 18px;
        padding: 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .brand img {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        object-fit: cover;
        border: 1px solid rgba(0, 0, 0, 0.12);
      }
      h1 {
        font-size: 28px;
        line-height: 1.2;
        margin: 18px 0 6px;
      }
      h2 {
        font-size: 18px;
        line-height: 1.3;
        margin: 18px 0 6px;
      }
      p {
        margin: 10px 0;
        color: rgba(0, 0, 0, 0.72);
        line-height: 1.5;
      }
      .grid {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }
      @media (min-width: 640px) {
        .grid {
          grid-template-columns: 1fr 1fr;
        }
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        width: 100%;
        padding: 14px 14px;
        border-radius: 14px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: #fff;
        color: #111;
        text-decoration: none;
        font-weight: 650;
      }
      .btn:hover {
        background: rgba(0, 0, 0, 0.03);
      }
      .muted {
        font-weight: 500;
        color: rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="card">
        <div class="brand">
          <img src="./assets/logo-cousy.webp" alt="Cousy Nicaragua" />
          <div>
            <strong>Cousy Nicaragua</strong>
            <div class="muted">B2B · Cotizaciones por WhatsApp</div>
          </div>
        </div>

        <h1>Regalos corporativos y productos ecológicos en Nicaragua</h1>
        <p>
          Armá tu lista de productos, definí cantidades y enviánosla por WhatsApp para cotizar rápido.
        </p>

        <h2>Elegí tu idioma</h2>
        <div class="grid" role="list">
          <a class="btn" role="listitem" href="./es/index.html">
            <span>Español</span>
            <span class="muted">LatAm</span>
          </a>
          <a class="btn" role="listitem" href="./en/index.html">
            <span>English</span>
            <span class="muted">US/Global</span>
          </a>
        </div>
      </div>
    </main>

    <script>
      (function () {
        var path = window.location.pathname || "";
        var isAlreadyLang = path.indexOf("/es/") !== -1 || path.indexOf("/en/") !== -1;
        if (isAlreadyLang) return;
        var lang = (navigator.language || "").toLowerCase();
        if (lang.indexOf("es") === 0) {
          window.location.replace("./es/index.html");
          return;
        }
        fetch("./en/index.html", { method: "HEAD" })
          .then(function (res) {
            window.location.replace(res && res.ok ? "./en/index.html" : "./es/index.html");
          })
          .catch(function () {
            window.location.replace("./es/index.html");
          });
      })();
    </script>
  </body>
</html>
